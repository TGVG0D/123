name: Google Remote Support (Código de 12 Dígitos)

on:
  workflow_dispatch:

jobs:
  generate-code:
    runs-on: windows-latest
    steps:
      - name: 1. Instalar Host do Google
        run: |
          $msiPath = "$env:TEMP\chromeremotedesktophost.msi"
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "$msiPath", "/quiet", "/norestart" -Wait

      - name: 2. Gerar Código de 12 Dígitos
        shell: powershell
        run: |
          Write-Host "Solicitando código ao Google..."
          # Comando que gera o código de suporte de 5 minutos
          & "C:\Program Files (x86)\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --get-support-code
          
          Write-Host "------------------------------------------------------------"
          Write-Host "AGUARDE ALGUNS SEGUNDOS E OLHE O LOG ACIMA"
          Write-Host "O código aparecerá como: 'Suporte: XXXX XXXX XXXX'"
          Write-Host "------------------------------------------------------------"

      - name: 3. Manter Sessão Aberta
        run: |
          # Mantém o Windows rodando para você conseguir conectar
          while ($true) { Start-Sleep -Seconds 60 }

