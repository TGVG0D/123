name: Google Remote Desktop (Funcional)

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Cole o código aqui (Gerado em remotedesktop.google.com/headless)'
        required: true

jobs:
  setup-crd:
    runs-on: windows-latest
    steps:
      - name: 1. Baixar e Instalar
        run: |
          $msiPath = "$env:TEMP\chromeremotedesktophost.msi"
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "$msiPath", "/quiet", "/norestart" -Wait

      - name: 2. Autenticar (Usando seu Código)
        shell: powershell
        run: |
          $code = "${{ github.event.inputs.auth_code }}"
          # Comando oficial para parear com sua conta Google
          & "C:\Program Files (x86)\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" `
          --code="$code" `
          --redirect-url="https://remotedesktop.google.com/_/oauthredirect" `
          --name="GitHub-PC" `
          --pin=123456
          
          Write-Host "---------------------------------------------------"
          Write-Host "SUCESSO! O PC aparecerá na lista 'MEUS COMPUTADORES'."
          Write-Host "Use o PIN: 123456"
          Write-Host "---------------------------------------------------"

      - name: 3. Manter Conexão
        run: |
          while($true) { Start-Sleep -Seconds 300 }
